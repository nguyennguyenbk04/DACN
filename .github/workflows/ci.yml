name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

jobs:
  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:4000/api

  # ── Backend: dependency check ────────────────────────────────────────────────
  backend:
    name: Backend — install check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: backend

  # ── AI service: lint ─────────────────────────────────────────────────────────
  ai-service:
    name: AI service — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check ai_service/

  # ── Docker builds ────────────────────────────────────────────────────────────
  docker-backend:
    name: Docker — backend
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  docker-frontend:
    name: Docker — frontend
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          build-args: VITE_API_URL=http://localhost:4000/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  docker-ai-service:
    name: Docker — ai_service
    runs-on: ubuntu-latest
    needs: ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ai_service image
        uses: docker/build-push-action@v5
        with:
          context: ai_service
          push: false
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,scope=ai-service,mode=max
